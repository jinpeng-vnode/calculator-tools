<script>
function addCourse() {
    const row = document.createElement('div');
    row.className = 'form-row course-row';
    row.innerHTML = '<div class="form-group" style="flex:2"><input type="text" placeholder="Course name"></div><div class="form-group" style="flex:1"><input type="number" placeholder="3" min="0" step="0.5"></div><div class="form-group" style="flex:1"><select><option value="">-</option><option value="4.3">A+</option><option value="4">A</option><option value="3.7">A-</option><option value="3.3">B+</option><option value="3">B</option><option value="2.7">B-</option><option value="2.3">C+</option><option value="2">C</option><option value="1.7">C-</option><option value="1.3">D+</option><option value="1">D</option><option value="0.7">D-</option><option value="0">F</option></select></div>';
    document.getElementById('courses').appendChild(row);
}
function calcGPA() {
    const rows = document.querySelectorAll('.course-row');
    let totalPoints = 0, totalCredits = 0;
    rows.forEach(row => {
        const credits = parseFloat(row.querySelector('input[type="number"]').value);
        const grade = row.querySelector('select').value;
        if (credits && grade !== '') {
            totalPoints += credits * parseFloat(grade);
            totalCredits += credits;
        }
    });
    if (totalCredits === 0) return;
    const gpa = totalPoints / totalCredits;
    const el = document.getElementById('result');
    el.innerHTML = `Your GPA: <strong>${gpa.toFixed(2)}</strong><br>
        Total Credits: ${totalCredits}<br>
        Total Grade Points: ${totalPoints.toFixed(1)}`;
    el.classList.add('show');
}
</script>
