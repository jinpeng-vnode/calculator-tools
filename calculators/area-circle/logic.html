<div class="form-row">
    <div class="form-group">
        <label for="radius">Radius</label>
        <input type="number" id="radius" placeholder="5" step="0.01" min="0">
    </div>
    <div class="form-group">
        <label for="unit">Unit</label>
        <select id="unit">
            <option value="cm">cm</option>
            <option value="m">m</option>
            <option value="in">inches</option>
            <option value="ft">feet</option>
        </select>
    </div>
</div>
<button class="btn" onclick="calcCircle()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcCircle() {
    const r = parseFloat(document.getElementById('radius').value);
    const unit = document.getElementById('unit').value;
    if (!r) return;
    const area = Math.PI * r * r;
    const circumference = 2 * Math.PI * r;
    const diameter = 2 * r;
    const el = document.getElementById('result');
    el.innerHTML = `Area: <strong>${area.toFixed(4)} ${unit}²</strong><br>Circumference: ${circumference.toFixed(4)} ${unit}<br>Diameter: ${diameter.toFixed(4)} ${unit}`;
    el.classList.add('show');
}
</script>
