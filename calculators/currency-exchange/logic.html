<div class="form-row">
    <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="100" step="0.01" min="0">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="fromCurrency">From</label>
        <select id="fromCurrency">
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="JPY">JPY - Japanese Yen</option>
            <option value="CNY">CNY - Chinese Yuan</option>
            <option value="CAD">CAD - Canadian Dollar</option>
            <option value="AUD">AUD - Australian Dollar</option>
            <option value="CHF">CHF - Swiss Franc</option>
        </select>
    </div>
    <div class="form-group">
        <label for="toCurrency">To</label>
        <select id="toCurrency">
            <option value="EUR">EUR - Euro</option>
            <option value="USD">USD - US Dollar</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="JPY">JPY - Japanese Yen</option>
            <option value="CNY">CNY - Chinese Yuan</option>
            <option value="CAD">CAD - Canadian Dollar</option>
            <option value="AUD">AUD - Australian Dollar</option>
            <option value="CHF">CHF - Swiss Franc</option>
        </select>
    </div>
</div>
<button class="btn" onclick="calcExchange()">Convert</button>
<div class="result" id="result"></div>
<script>
function calcExchange() {
    const rates = {USD:1, EUR:0.92, GBP:0.79, JPY:154.5, CNY:7.24, CAD:1.36, AUD:1.53, CHF:0.88};
    const amount = parseFloat(document.getElementById('amount').value);
    const from = document.getElementById('fromCurrency').value;
    const to = document.getElementById('toCurrency').value;
    if (!amount) return;
    const inUSD = amount / rates[from];
    const result = inUSD * rates[to];
    const rate = rates[to] / rates[from];
    const el = document.getElementById('result');
    el.innerHTML = `${amount} ${from} = <strong>${result.toFixed(2)} ${to}</strong><br>Rate: 1 ${from} = ${rate.toFixed(4)} ${to}<br><small>Approximate reference rates</small>`;
    el.classList.add('show');
}
</script>
