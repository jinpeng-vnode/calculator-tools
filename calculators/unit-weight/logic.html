<div class="form-row">
    <div class="form-group">
        <label for="wVal">Value</label>
        <input type="number" id="wVal" placeholder="1" step="any">
    </div>
    <div class="form-group">
        <label for="wFrom">From</label>
        <select id="wFrom">
            <option value="kg">Kilogram (kg)</option>
            <option value="g">Gram (g)</option>
            <option value="mg">Milligram (mg)</option>
            <option value="lb">Pound (lb)</option>
            <option value="oz">Ounce (oz)</option>
            <option value="st">Stone (st)</option>
            <option value="t">Metric Ton (t)</option>
        </select>
    </div>
</div>
<div class="form-group">
    <label for="wTo">To</label>
    <select id="wTo">
        <option value="lb">Pound (lb)</option>
        <option value="kg">Kilogram (kg)</option>
        <option value="g">Gram (g)</option>
        <option value="mg">Milligram (mg)</option>
        <option value="oz">Ounce (oz)</option>
        <option value="st">Stone (st)</option>
        <option value="t">Metric Ton (t)</option>
    </select>
</div>
<button class="btn" onclick="convertWeight()">Convert</button>
<div class="result" id="result"></div>
<script>
const toKg = {kg:1, g:0.001, mg:0.000001, lb:0.453592, oz:0.0283495, st:6.35029, t:1000};
function convertWeight() {
    const val = parseFloat(document.getElementById('wVal').value);
    const from = document.getElementById('wFrom').value;
    const to = document.getElementById('wTo').value;
    if (isNaN(val)) return;
    const result = val * toKg[from] / toKg[to];
    const formatted = result < 0.01 ? result.toExponential(4) : result.toFixed(6).replace(/\.?0+$/, '');
    const el = document.getElementById('result');
    el.innerHTML = `${val} ${from} = <strong>${formatted} ${to}</strong>`;
    el.classList.add('show');
}
</script>
