<div class="form-row">
    <div class="form-group">
        <label for="watts">Power (Watts)</label>
        <input type="number" id="watts" placeholder="1000" min="1">
    </div>
    <div class="form-group">
        <label for="hours">Hours per Day</label>
        <input type="number" id="hours" placeholder="8" step="0.5" min="0" max="24">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="days">Days</label>
        <input type="number" id="days" placeholder="30" min="1" max="365">
    </div>
    <div class="form-group">
        <label for="rate">Rate ($/kWh)</label>
        <input type="number" id="rate" placeholder="0.12" step="0.01" min="0">
    </div>
</div>
<button class="btn" onclick="calcElectricity()">Calculate Cost</button>
<div class="result" id="result"></div>
<script>
function calcElectricity() {
    const watts = parseFloat(document.getElementById('watts').value);
    const hours = parseFloat(document.getElementById('hours').value);
    const days = parseFloat(document.getElementById('days').value);
    const rate = parseFloat(document.getElementById('rate').value);
    if (!watts || !hours || !days || !rate) return;
    const kWh = (watts * hours * days) / 1000;
    const cost = kWh * rate;
    const dailyCost = (watts * hours / 1000) * rate;
    const el = document.getElementById('result');
    el.innerHTML = `Total Energy: <strong>${kWh.toFixed(2)} kWh</strong><br>Total Cost: <strong>$${cost.toFixed(2)}</strong><br>Daily Cost: $${dailyCost.toFixed(2)}<br>Monthly Estimate: $${(dailyCost * 30).toFixed(2)}`;
    el.classList.add('show');
}
</script>
