<div class="form-row">
    <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="1" step="0.01" min="0">
    </div>
    <div class="form-group">
        <label for="fromUnit">From</label>
        <select id="fromUnit">
            <option value="236.588">Cup (US)</option>
            <option value="14.787">Tablespoon</option>
            <option value="4.929">Teaspoon</option>
            <option value="1" selected>Milliliter (ml)</option>
            <option value="1000">Liter</option>
            <option value="29.574">Fluid Ounce (US)</option>
            <option value="473.176">Pint (US)</option>
        </select>
    </div>
</div>
<button class="btn" onclick="convertCooking()">Convert</button>
<div class="result" id="result"></div>
<script>
function convertCooking() {
    const amount = parseFloat(document.getElementById('amount').value);
    const fromMl = parseFloat(document.getElementById('fromUnit').value);
    if (!amount) return;
    const ml = amount * fromMl;
    const units = [
        {name: 'Cups (US)', ml: 236.588},
        {name: 'Tablespoons', ml: 14.787},
        {name: 'Teaspoons', ml: 4.929},
        {name: 'Milliliters', ml: 1},
        {name: 'Liters', ml: 1000},
        {name: 'Fluid Ounces (US)', ml: 29.574},
        {name: 'Pints (US)', ml: 473.176}
    ];
    let html = '';
    units.forEach(u => {
        const val = ml / u.ml;
        html += `${u.name}: <strong>${val < 0.01 ? val.toExponential(2) : val.toFixed(3)}</strong><br>`;
    });
    const el = document.getElementById('result');
    el.innerHTML = html;
    el.classList.add('show');
}
</script>
