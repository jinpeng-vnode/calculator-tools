<div class="form-row">
    <div class="form-group">
        <label for="principal">Principal ($)</label>
        <input type="number" id="principal" placeholder="10000" min="0">
    </div>
    <div class="form-group">
        <label for="rate">Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="5" step="0.01" min="0">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="years">Time (years)</label>
        <input type="number" id="years" placeholder="10" min="0" max="100">
    </div>
    <div class="form-group">
        <label for="compound">Compounding</label>
        <select id="compound">
            <option value="365">Daily</option>
            <option value="12">Monthly</option>
            <option value="4">Quarterly</option>
            <option value="1">Annually</option>
        </select>
    </div>
</div>
<button class="btn" onclick="calcCompound()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcCompound() {
    const P = parseFloat(document.getElementById('principal').value);
    const r = parseFloat(document.getElementById('rate').value) / 100;
    const t = parseFloat(document.getElementById('years').value);
    const n = parseInt(document.getElementById('compound').value);
    if (!P || !r || !t) return;
    const A = P * Math.pow(1 + r / n, n * t);
    const interest = A - P;
    const el = document.getElementById('result');
    el.innerHTML = `Final Balance: <strong>$${A.toFixed(2)}</strong><br>Total Interest Earned: $${interest.toFixed(2)}<br>Initial Principal: $${P.toFixed(2)}`;
    el.classList.add('show');
}
</script>
