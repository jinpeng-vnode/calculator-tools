<div class="form-row">
    <div class="form-group">
        <label for="initial">Initial Investment ($)</label>
        <input type="number" id="initial" placeholder="10000" min="0" step="0.01">
    </div>
    <div class="form-group">
        <label for="final">Final Value ($)</label>
        <input type="number" id="final" placeholder="15000" min="0" step="0.01">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="years">Investment Period (years)</label>
        <input type="number" id="years" placeholder="5" min="0.1" step="0.1">
    </div>
</div>
<button class="btn" onclick="calcReturn()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcReturn() {
    const init = parseFloat(document.getElementById('initial').value);
    const fin = parseFloat(document.getElementById('final').value);
    const yrs = parseFloat(document.getElementById('years').value);
    if (!init || !fin || !yrs) return;
    const totalReturn = ((fin - init) / init) * 100;
    const annualized = (Math.pow(fin / init, 1 / yrs) - 1) * 100;
    const gain = fin - init;
    const el = document.getElementById('result');
    el.innerHTML = `Total ROI: <strong>${totalReturn.toFixed(2)}%</strong><br>Annualized Return: <strong>${annualized.toFixed(2)}%</strong><br>Total Gain/Loss: $${gain.toFixed(2)}`;
    el.classList.add('show');
}
</script>
