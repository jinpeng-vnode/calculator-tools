<div class="form-row">
    <div class="form-group">
        <label for="fromVal">Value</label>
        <input type="number" id="fromVal" placeholder="1" step="any">
    </div>
    <div class="form-group">
        <label for="fromUnit">From</label>
        <select id="fromUnit">
            <option value="m">Meter (m)</option>
            <option value="cm">Centimeter (cm)</option>
            <option value="mm">Millimeter (mm)</option>
            <option value="km">Kilometer (km)</option>
            <option value="in">Inch (in)</option>
            <option value="ft">Foot (ft)</option>
            <option value="yd">Yard (yd)</option>
            <option value="mi">Mile (mi)</option>
        </select>
    </div>
</div>
<div class="form-group">
    <label for="toUnit">To</label>
    <select id="toUnit">
        <option value="ft">Foot (ft)</option>
        <option value="m">Meter (m)</option>
        <option value="cm">Centimeter (cm)</option>
        <option value="mm">Millimeter (mm)</option>
        <option value="km">Kilometer (km)</option>
        <option value="in">Inch (in)</option>
        <option value="yd">Yard (yd)</option>
        <option value="mi">Mile (mi)</option>
    </select>
</div>
<button class="btn" onclick="convertLength()">Convert</button>
<div class="result" id="result"></div>
<script>
const toMeter = {m:1, cm:0.01, mm:0.001, km:1000, in:0.0254, ft:0.3048, yd:0.9144, mi:1609.344};
function convertLength() {
    const val = parseFloat(document.getElementById('fromVal').value);
    const from = document.getElementById('fromUnit').value;
    const to = document.getElementById('toUnit').value;
    if (isNaN(val)) return;
    const result = (val * toMeter[from] / toMeter[to]);
    const formatted = result < 0.01 ? result.toExponential(4) : result.toFixed(6).replace(/\.?0+$/, '');
    const el = document.getElementById('result');
    el.innerHTML = `${val} ${from} = <strong>${formatted} ${to}</strong>`;
    el.classList.add('show');
}
</script>
