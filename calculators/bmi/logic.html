<div class="form-row">
    <div class="form-group">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="170" min="50" max="300">
    </div>
    <div class="form-group">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="70" min="10" max="500">
    </div>
</div>
<button class="btn" onclick="calcBMI()">Calculate BMI</button>
<div class="result" id="result"></div>
<script>
function calcBMI() {
    const h = parseFloat(document.getElementById('height').value);
    const w = parseFloat(document.getElementById('weight').value);
    if (!h || !w) return;
    const bmi = (w / ((h/100) ** 2)).toFixed(1);
    let cat = '';
    if (bmi < 18.5) cat = 'Underweight';
    else if (bmi < 25) cat = 'Normal weight ✓';
    else if (bmi < 30) cat = 'Overweight';
    else cat = 'Obese';
    const el = document.getElementById('result');
    el.innerHTML = `Your BMI: <strong>${bmi}</strong><br><span>${cat}</span>`;
    el.classList.add('show');
}
</script>
