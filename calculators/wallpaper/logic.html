<div class="form-row">
    <div class="form-group">
        <label for="roomLength">Room Length (feet)</label>
        <input type="number" id="roomLength" placeholder="15" step="0.1" min="0">
    </div>
    <div class="form-group">
        <label for="roomWidth">Room Width (feet)</label>
        <input type="number" id="roomWidth" placeholder="12" step="0.1" min="0">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="wallHeight">Wall Height (feet)</label>
        <input type="number" id="wallHeight" placeholder="8" step="0.1" min="0">
    </div>
    <div class="form-group">
        <label for="rollSize">Roll Coverage (sq ft)</label>
        <select id="rollSize">
            <option value="57">US Standard (57 sq ft)</option>
            <option value="56">Euro Standard (56 sq ft)</option>
            <option value="72">Double Roll (72 sq ft)</option>
        </select>
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="doors">Doors</label>
        <input type="number" id="doors" placeholder="1" min="0" value="1">
    </div>
    <div class="form-group">
        <label for="windows">Windows</label>
        <input type="number" id="windows" placeholder="2" min="0" value="2">
    </div>
</div>
<button class="btn" onclick="calcWallpaper()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcWallpaper() {
    const l = parseFloat(document.getElementById('roomLength').value);
    const w = parseFloat(document.getElementById('roomWidth').value);
    const h = parseFloat(document.getElementById('wallHeight').value);
    const rollSqFt = parseFloat(document.getElementById('rollSize').value);
    const doors = parseInt(document.getElementById('doors').value) || 0;
    const windows = parseInt(document.getElementById('windows').value) || 0;
    if (!l || !w || !h) return;
    const perimeter = 2 * (l + w);
    const wallArea = perimeter * h;
    const openings = doors * 20 + windows * 15;
    const netArea = wallArea - openings;
    const usablePerRoll = rollSqFt * 0.85;
    const rolls = Math.ceil(netArea / usablePerRoll);
    const el = document.getElementById('result');
    el.innerHTML = `Rolls Needed: <strong>${rolls} rolls</strong><br>Wall Area: ${wallArea.toFixed(0)} sq ft<br>Net Area (minus openings): ${netArea.toFixed(0)} sq ft<br>Includes 15% waste for pattern matching`;
    el.classList.add('show');
}
</script>
