<div class="form-row">
    <div class="form-group">
        <label for="loanAmount">Loan Amount ($)</label>
        <input type="number" id="loanAmount" placeholder="300000" min="1000">
    </div>
    <div class="form-group">
        <label for="interestRate">Annual Interest Rate (%)</label>
        <input type="number" id="interestRate" placeholder="6.5" step="0.01" min="0">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="loanTerm">Loan Term (years)</label>
        <input type="number" id="loanTerm" placeholder="30" min="1" max="50">
    </div>
</div>
<button class="btn" onclick="calcMortgage()">Calculate Payment</button>
<div class="result" id="result"></div>
<script>
function calcMortgage() {
    const P = parseFloat(document.getElementById('loanAmount').value);
    const annualRate = parseFloat(document.getElementById('interestRate').value);
    const years = parseFloat(document.getElementById('loanTerm').value);
    if (!P || !annualRate || !years) return;
    const r = annualRate / 100 / 12;
    const n = years * 12;
    const payment = P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
    const totalPaid = payment * n;
    const totalInterest = totalPaid - P;
    const el = document.getElementById('result');
    el.innerHTML = `Monthly Payment: <strong>$${payment.toFixed(2)}</strong><br>Total Interest: $${totalInterest.toFixed(2)}<br>Total Paid: $${totalPaid.toFixed(2)}`;
    el.classList.add('show');
}
</script>
