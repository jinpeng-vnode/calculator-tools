<div class="form-row">
    <div class="form-group">
        <label for="goal">Savings Goal ($)</label>
        <input type="number" id="goal" placeholder="50000" min="0" step="0.01">
    </div>
    <div class="form-group">
        <label for="current">Current Savings ($)</label>
        <input type="number" id="current" placeholder="5000" min="0" step="0.01">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="months">Months to Goal</label>
        <input type="number" id="months" placeholder="36" min="1" max="600">
    </div>
    <div class="form-group">
        <label for="rate">Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="4.5" min="0" step="0.1">
    </div>
</div>
<button class="btn" onclick="calcGoal()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcGoal() {
    const goal = parseFloat(document.getElementById('goal').value);
    const current = parseFloat(document.getElementById('current').value) || 0;
    const months = parseInt(document.getElementById('months').value);
    const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
    if (!goal || !months) return;
    const needed = goal - current;
    let monthly;
    if (rate === 0) { monthly = needed / months; }
    else { const fv = current * Math.pow(1 + rate, months); const remaining = goal - fv; monthly = remaining * rate / (Math.pow(1 + rate, months) - 1); }
    const totalContrib = monthly * months;
    const interestEarned = goal - current - totalContrib;
    const el = document.getElementById('result');
    el.innerHTML = `Monthly Savings Needed: <strong>$${monthly.toFixed(2)}</strong><br>Total Contributions: $${totalContrib.toFixed(2)}<br>Interest Earned: $${interestEarned.toFixed(2)}<br>Goal: $${goal.toLocaleString()}`;
    el.classList.add('show');
}
</script>
