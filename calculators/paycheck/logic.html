<div class="form-row">
    <div class="form-group">
        <label for="gross">Annual Gross Salary ($)</label>
        <input type="number" id="gross" placeholder="75000" min="0">
    </div>
    <div class="form-group">
        <label for="payFreq">Pay Frequency</label>
        <select id="payFreq">
            <option value="26">Bi-weekly</option>
            <option value="24">Semi-monthly</option>
            <option value="12">Monthly</option>
            <option value="52">Weekly</option>
        </select>
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="fedRate">Effective Federal Tax Rate (%)</label>
        <input type="number" id="fedRate" placeholder="22" min="0" max="50" step="0.1">
    </div>
    <div class="form-group">
        <label for="stateRate">State Tax Rate (%)</label>
        <input type="number" id="stateRate" placeholder="5" min="0" max="15" step="0.1">
    </div>
</div>
<button class="btn" onclick="calcPaycheck()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcPaycheck() {
    const gross = parseFloat(document.getElementById('gross').value);
    const freq = parseInt(document.getElementById('payFreq').value);
    const fedRate = parseFloat(document.getElementById('fedRate').value) / 100 || 0;
    const stateRate = parseFloat(document.getElementById('stateRate').value) / 100 || 0;
    if (!gross) return;
    const ss = Math.min(gross, 168600) * 0.062;
    const medicare = gross * 0.0145;
    const fedTax = gross * fedRate;
    const stateTax = gross * stateRate;
    const totalDeductions = ss + medicare + fedTax + stateTax;
    const netAnnual = gross - totalDeductions;
    const netPer = netAnnual / freq;
    const el = document.getElementById('result');
    el.innerHTML = `Net Pay Per Period: <strong>$${netPer.toFixed(2)}</strong><br>Annual Net Pay: $${netAnnual.toFixed(2)}<br>Federal Tax: $${fedTax.toFixed(2)}<br>State Tax: $${stateTax.toFixed(2)}<br>Social Security: $${ss.toFixed(2)}<br>Medicare: $${medicare.toFixed(2)}`;
    el.classList.add('show');
}
</script>
