<div class="form-group">
    <label for="diameter">Pipe Inner Diameter (mm)</label>
    <input type="number" id="diameter" placeholder="50" step="any">
</div>
<div class="form-group">
    <label for="velocity">Flow Velocity (m/s)</label>
    <input type="number" id="velocity" placeholder="2" step="any">
</div>
<button class="btn" onclick="calcFlow()">Calculate Flow Rate</button>
<div class="result" id="result"></div>

<script>
function calcFlow(){
    const d=parseFloat(document.getElementById('diameter').value)/1000;
    const v=parseFloat(document.getElementById('velocity').value);
    if(isNaN(d)||isNaN(v)||d<=0)return;
    const area=Math.PI*(d/2)**2;
    const qM3s=area*v;
    const qLpm=qM3s*60000;
    const qGpm=qLpm*0.264172;
    const el=document.getElementById('result');
    el.innerHTML=`<p>Cross-section area: <strong>${(area*1e6).toFixed(2)} mm²</strong></p><p>Flow rate: <strong>${qM3s.toFixed(6)} m³/s</strong></p><p>Flow rate: <strong>${qLpm.toFixed(2)} L/min</strong></p><p>Flow rate: <strong>${qGpm.toFixed(2)} GPM</strong></p><p>Velocity: <strong>${v} m/s</strong></p>`;
    el.classList.add('show');
}
</script>
