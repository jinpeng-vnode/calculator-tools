<div class="form-row">
    <div class="form-group">
        <label for="hourlyRate">Hourly Rate ($)</label>
        <input type="number" id="hourlyRate" placeholder="25" min="0" step="0.01">
    </div>
    <div class="form-group">
        <label for="regularHours">Regular Hours/Week</label>
        <input type="number" id="regularHours" placeholder="40" min="0" max="168">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="otHours">Overtime Hours</label>
        <input type="number" id="otHours" placeholder="10" min="0" max="128">
    </div>
    <div class="form-group">
        <label for="otMultiplier">Overtime Multiplier</label>
        <select id="otMultiplier">
            <option value="1.5">1.5x (Time and a half)</option>
            <option value="2">2x (Double time)</option>
        </select>
    </div>
</div>
<button class="btn" onclick="calcOvertime()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcOvertime() {
    const rate = parseFloat(document.getElementById('hourlyRate').value);
    const regHrs = parseFloat(document.getElementById('regularHours').value);
    const otHrs = parseFloat(document.getElementById('otHours').value);
    const mult = parseFloat(document.getElementById('otMultiplier').value);
    if (!rate || !regHrs) return;
    const regPay = rate * regHrs;
    const otRate = rate * mult;
    const otPay = otRate * (otHrs || 0);
    const total = regPay + otPay;
    const el = document.getElementById('result');
    el.innerHTML = `Regular Pay: $${regPay.toFixed(2)}<br>Overtime Rate: $${otRate.toFixed(2)}/hr<br>Overtime Pay: $${otPay.toFixed(2)}<br>Total Weekly Pay: <strong>$${total.toFixed(2)}</strong>`;
    el.classList.add('show');
}
</script>
