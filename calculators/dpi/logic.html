<div class="form-row">
    <div class="form-group">
        <label for="resW">Resolution Width (px)</label>
        <input type="number" id="resW" placeholder="1920" min="1">
    </div>
    <div class="form-group">
        <label for="resH">Resolution Height (px)</label>
        <input type="number" id="resH" placeholder="1080" min="1">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="diagonal">Screen Diagonal (inches)</label>
        <input type="number" id="diagonal" placeholder="24" step="0.1" min="1">
    </div>
</div>
<button class="btn" onclick="calcDPI()">Calculate DPI/PPI</button>
<div class="result" id="result"></div>
<script>
function calcDPI() {
    const w = parseInt(document.getElementById('resW').value);
    const h = parseInt(document.getElementById('resH').value);
    const diag = parseFloat(document.getElementById('diagonal').value);
    if (!w || !h || !diag) return;
    const diagPx = Math.sqrt(w*w + h*h);
    const ppi = diagPx / diag;
    const dotPitch = 25.4 / ppi;
    const el = document.getElementById('result');
    el.innerHTML = `<strong>PPI: ${ppi.toFixed(1)}</strong><br>Dot pitch: ${dotPitch.toFixed(3)} mm<br>Diagonal pixels: ${Math.round(diagPx)} px<br><br>Screen size: ${(w/ppi*2.54).toFixed(1)} × ${(h/ppi*2.54).toFixed(1)} cm`;
    el.classList.add('show');
}
</script>
