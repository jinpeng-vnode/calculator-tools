<div class="form-row">
    <div class="form-group">
        <label for="radius">Radius</label>
        <input type="number" id="radius" placeholder="5" step="0.01" min="0">
    </div>
    <div class="form-group">
        <label for="height">Height</label>
        <input type="number" id="height" placeholder="10" step="0.01" min="0">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="unit">Unit</label>
        <select id="unit">
            <option value="cm">cm</option>
            <option value="m">m</option>
            <option value="in">inches</option>
            <option value="ft">feet</option>
        </select>
    </div>
</div>
<button class="btn" onclick="calcCylinder()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcCylinder() {
    const r = parseFloat(document.getElementById('radius').value);
    const h = parseFloat(document.getElementById('height').value);
    const unit = document.getElementById('unit').value;
    if (!r || !h) return;
    const volume = Math.PI * r * r * h;
    const lateralArea = 2 * Math.PI * r * h;
    const totalArea = 2 * Math.PI * r * r + lateralArea;
    const el = document.getElementById('result');
    el.innerHTML = `Volume: <strong>${volume.toFixed(4)} ${unit}³</strong><br>Surface Area: ${totalArea.toFixed(4)} ${unit}²<br>Lateral Area: ${lateralArea.toFixed(4)} ${unit}²`;
    el.classList.add('show');
}
</script>
