<div class="form-group">
    <label for="favorable">Favorable Outcomes</label>
    <input type="number" id="favorable" placeholder="1">
</div>
<div class="form-group">
    <label for="total">Total Outcomes</label>
    <input type="number" id="total" placeholder="6">
</div>
<button class="btn" onclick="calcProb()">Calculate Probability</button>
<div class="result" id="result1"></div>

<hr style="margin:1.5rem 0;border:none;border-top:1px solid var(--border)">

<div class="form-group">
    <label for="nVal">n (total items)</label>
    <input type="number" id="nVal" placeholder="10">
</div>
<div class="form-group">
    <label for="rVal">r (chosen items)</label>
    <input type="number" id="rVal" placeholder="3">
</div>
<button class="btn" onclick="calcPerm()">Permutations & Combinations</button>
<div class="result" id="result2"></div>

<script>
function fact(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r}
function calcProb(){
    const f=parseFloat(document.getElementById('favorable').value);
    const t=parseFloat(document.getElementById('total').value);
    if(isNaN(f)||isNaN(t)||t===0)return;
    const p=f/t;
    const el=document.getElementById('result1');
    el.innerHTML=`Probability: <strong>${p.toFixed(6)}</strong> (${(p*100).toFixed(2)}%)<br>Odds: ${f} in ${t}`;
    el.classList.add('show');
}
function calcPerm(){
    const n=parseInt(document.getElementById('nVal').value);
    const r=parseInt(document.getElementById('rVal').value);
    if(isNaN(n)||isNaN(r)||n<0||r<0||r>n)return;
    const perm=fact(n)/fact(n-r);
    const comb=fact(n)/(fact(r)*fact(n-r));
    const el=document.getElementById('result2');
    el.innerHTML=`<p>Permutations (nPr): <strong>${perm.toLocaleString()}</strong></p><p>Combinations (nCr): <strong>${comb.toLocaleString()}</strong></p>`;
    el.classList.add('show');
}
</script>
