<div class="form-row">
    <div class="form-group">
        <label for="length">Length (feet)</label>
        <input type="number" id="length" placeholder="20" step="0.1" min="0">
    </div>
    <div class="form-group">
        <label for="width">Width (feet)</label>
        <input type="number" id="width" placeholder="10" step="0.1" min="0">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="depth">Depth (inches)</label>
        <input type="number" id="depth" placeholder="4" step="0.5" min="0">
    </div>
    <div class="form-group">
        <label for="waste">Waste Factor (%)</label>
        <input type="number" id="waste" placeholder="10" min="0" max="30" value="10">
    </div>
</div>
<button class="btn" onclick="calcConcrete()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcConcrete() {
    const l = parseFloat(document.getElementById('length').value);
    const w = parseFloat(document.getElementById('width').value);
    const d = parseFloat(document.getElementById('depth').value);
    const waste = parseFloat(document.getElementById('waste').value) || 0;
    if (!l || !w || !d) return;
    const depthFt = d / 12;
    const cubicFt = l * w * depthFt;
    const cubicYards = cubicFt / 27;
    const withWaste = cubicYards * (1 + waste / 100);
    const bags60 = Math.ceil(cubicFt * (1 + waste / 100) / 0.45);
    const bags80 = Math.ceil(cubicFt * (1 + waste / 100) / 0.6);
    const el = document.getElementById('result');
    el.innerHTML = `Concrete Needed: <strong>${withWaste.toFixed(2)} cubic yards</strong><br>Without waste: ${cubicYards.toFixed(2)} yd³<br>Volume: ${cubicFt.toFixed(1)} ft³<br>Or: ${bags60} bags (60lb) / ${bags80} bags (80lb)`;
    el.classList.add('show');
}
</script>
