<div class="form-group">
    <label for="calcType">Solve for:</label>
    <select id="calcType" onchange="toggleInputs()">
        <option value="I">Current (I)</option>
        <option value="V">Voltage (V)</option>
        <option value="R">Resistance (R)</option>
    </select>
</div>
<div class="form-group" id="vGroup">
    <label for="v">Voltage (V)</label>
    <input type="number" id="v" placeholder="12" step="any">
</div>
<div class="form-group" id="iGroup">
    <label for="i">Current (A)</label>
    <input type="number" id="i" placeholder="2" step="any">
</div>
<div class="form-group" id="rGroup">
    <label for="r">Resistance (Ω)</label>
    <input type="number" id="r" placeholder="6" step="any">
</div>
<button class="btn" onclick="calcOhm()">Calculate</button>
<div class="result" id="result"></div>

<script>
function toggleInputs(){
    const t=document.getElementById('calcType').value;
    document.getElementById('vGroup').style.display=t==='V'?'none':'';
    document.getElementById('iGroup').style.display=t==='I'?'none':'';
    document.getElementById('rGroup').style.display=t==='R'?'none':'';
}
function calcOhm(){
    const t=document.getElementById('calcType').value;
    const v=parseFloat(document.getElementById('v').value);
    const i=parseFloat(document.getElementById('i').value);
    const r=parseFloat(document.getElementById('r').value);
    let res='';
    if(t==='I'&&!isNaN(v)&&!isNaN(r)&&r!==0){const I=v/r;const P=v*I;res=`Current I = V/R = ${v}/${r} = <strong>${I.toFixed(4)} A</strong><br>Power P = ${P.toFixed(4)} W`;}
    else if(t==='V'&&!isNaN(i)&&!isNaN(r)){const V=i*r;const P=V*i;res=`Voltage V = I×R = ${i}×${r} = <strong>${V.toFixed(4)} V</strong><br>Power P = ${P.toFixed(4)} W`;}
    else if(t==='R'&&!isNaN(v)&&!isNaN(i)&&i!==0){const R=v/i;const P=v*i;res=`Resistance R = V/I = ${v}/${i} = <strong>${R.toFixed(4)} Ω</strong><br>Power P = ${P.toFixed(4)} W`;}
    else return;
    const el=document.getElementById('result');el.innerHTML=res;el.classList.add('show');
}
</script>
