<div class="form-row">
    <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="30" min="15" max="100">
    </div>
    <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="75" min="30">
    </div>
    <div class="form-group">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="175" min="100">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="activity">Activity Level</label>
        <select id="activity">
            <option value="1.2">Sedentary (office job)</option>
            <option value="1.375">Light (1-3 days/week)</option>
            <option value="1.55">Moderate (3-5 days/week)</option>
            <option value="1.725">Active (6-7 days/week)</option>
            <option value="1.9">Very Active (athlete)</option>
        </select>
    </div>
    <div class="form-group">
        <label for="goal">Weekly Goal</label>
        <select id="goal">
            <option value="250">Lose 0.25 kg/week</option>
            <option value="500">Lose 0.5 kg/week</option>
            <option value="750">Lose 0.75 kg/week</option>
            <option value="1000">Lose 1 kg/week</option>
        </select>
    </div>
</div>
<button class="btn" onclick="calcDeficit()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcDeficit() {
    const age = parseFloat(document.getElementById('age').value);
    const gender = document.getElementById('gender').value;
    const weight = parseFloat(document.getElementById('weight').value);
    const height = parseFloat(document.getElementById('height').value);
    const activity = parseFloat(document.getElementById('activity').value);
    const deficit = parseFloat(document.getElementById('goal').value);
    if (!age || !weight || !height) return;
    let bmr;
    if (gender === 'male') {
        bmr = 10 * weight + 6.25 * height - 5 * age + 5;
    } else {
        bmr = 10 * weight + 6.25 * height - 5 * age - 161;
    }
    const tdee = bmr * activity;
    const target = tdee - deficit;
    const el = document.getElementById('result');
    el.innerHTML = `BMR: <strong>${Math.round(bmr)} cal/day</strong><br>TDEE: <strong>${Math.round(tdee)} cal/day</strong><br>Daily Target: <strong>${Math.round(target)} cal/day</strong><br>Daily Deficit: ${deficit} cal`;
    el.classList.add('show');
}
</script>
