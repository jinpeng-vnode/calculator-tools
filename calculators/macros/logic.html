<div class="form-row">
    <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>
    <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="30" min="10" max="100">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="70" min="30" max="300">
    </div>
    <div class="form-group">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="175" min="100" max="250">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="activity">Activity Level</label>
        <select id="activity">
            <option value="1.2">Sedentary</option>
            <option value="1.375">Light (1-3 days/week)</option>
            <option value="1.55">Moderate (3-5 days/week)</option>
            <option value="1.725">Active (6-7 days/week)</option>
            <option value="1.9">Very Active</option>
        </select>
    </div>
    <div class="form-group">
        <label for="goal">Goal</label>
        <select id="goal">
            <option value="lose">Weight Loss</option>
            <option value="maintain">Maintain</option>
            <option value="gain">Muscle Gain</option>
        </select>
    </div>
</div>
<button class="btn" onclick="calcMacros()">Calculate Macros</button>
<div class="result" id="result"></div>
<script>
function calcMacros() {
    const gender = document.getElementById('gender').value;
    const age = parseInt(document.getElementById('age').value);
    const weight = parseFloat(document.getElementById('weight').value);
    const height = parseFloat(document.getElementById('height').value);
    const activity = parseFloat(document.getElementById('activity').value);
    const goal = document.getElementById('goal').value;
    if (!age || !weight || !height) return;
    let bmr;
    if (gender === 'male') bmr = 10 * weight + 6.25 * height - 5 * age + 5;
    else bmr = 10 * weight + 6.25 * height - 5 * age - 161;
    let tdee = Math.round(bmr * activity);
    let cals = tdee;
    let pPct, cPct, fPct;
    if (goal === 'lose') { cals = Math.round(tdee * 0.8); pPct=0.40; cPct=0.30; fPct=0.30; }
    else if (goal === 'gain') { cals = Math.round(tdee * 1.15); pPct=0.30; cPct=0.45; fPct=0.25; }
    else { pPct=0.30; cPct=0.40; fPct=0.30; }
    const protein = Math.round(cals * pPct / 4);
    const carbs = Math.round(cals * cPct / 4);
    const fat = Math.round(cals * fPct / 9);
    const el = document.getElementById('result');
    el.innerHTML = `TDEE: <strong>${tdee} kcal</strong> | Target: <strong>${cals} kcal</strong><br><br>Protein: <strong>${protein}g</strong> (${Math.round(pPct*100)}%)<br>Carbs: <strong>${carbs}g</strong> (${Math.round(cPct*100)}%)<br>Fat: <strong>${fat}g</strong> (${Math.round(fPct*100)}%)`;
    el.classList.add('show');
}
</script>
