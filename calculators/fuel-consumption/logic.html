<div class="form-row">
    <div class="form-group">
        <label for="distance">Distance</label>
        <input type="number" id="distance" placeholder="500" step="0.1" min="0">
    </div>
    <div class="form-group">
        <label for="distUnit">Unit</label>
        <select id="distUnit">
            <option value="km">km</option>
            <option value="miles">miles</option>
        </select>
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="fuel">Fuel Used</label>
        <input type="number" id="fuel" placeholder="40" step="0.1" min="0">
    </div>
    <div class="form-group">
        <label for="fuelUnit">Unit</label>
        <select id="fuelUnit">
            <option value="liters">Liters</option>
            <option value="gallons">Gallons (US)</option>
        </select>
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="fuelPrice">Fuel Price (per unit)</label>
        <input type="number" id="fuelPrice" placeholder="1.50" step="0.01" min="0">
    </div>
</div>
<button class="btn" onclick="calcFuel()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcFuel() {
    let dist = parseFloat(document.getElementById('distance').value);
    let fuel = parseFloat(document.getElementById('fuel').value);
    const distUnit = document.getElementById('distUnit').value;
    const fuelUnit = document.getElementById('fuelUnit').value;
    const price = parseFloat(document.getElementById('fuelPrice').value) || 0;
    if (!dist || !fuel) return;
    const distKm = distUnit === 'miles' ? dist * 1.60934 : dist;
    const fuelL = fuelUnit === 'gallons' ? fuel * 3.78541 : fuel;
    const lPer100 = (fuelL / distKm) * 100;
    const mpg = (distUnit === 'miles' ? dist : dist * 0.621371) / (fuelUnit === 'gallons' ? fuel : fuel / 3.78541);
    const cost = fuel * price;
    const costPerKm = cost / distKm;
    const el = document.getElementById('result');
    el.innerHTML = `Consumption: <strong>${lPer100.toFixed(2)} L/100km</strong><br>MPG: ${mpg.toFixed(1)} miles/gallon<br>Trip Cost: $${cost.toFixed(2)}<br>Cost per km: $${costPerKm.toFixed(3)}`;
    el.classList.add('show');
}
</script>
