<div class="form-row">
    <div class="form-group">
        <label for="balance">Current Balance ($)</label>
        <input type="number" id="balance" placeholder="25000" min="0" step="0.01">
    </div>
    <div class="form-group">
        <label for="apr">Annual Interest Rate (%)</label>
        <input type="number" id="apr" placeholder="18" min="0" step="0.01">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="payment">Monthly Payment ($)</label>
        <input type="number" id="payment" placeholder="500" min="0" step="0.01">
    </div>
</div>
<button class="btn" onclick="calcDebt()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcDebt() {
    const bal = parseFloat(document.getElementById('balance').value);
    const apr = parseFloat(document.getElementById('apr').value) / 100;
    const pmt = parseFloat(document.getElementById('payment').value);
    if (!bal || !apr || !pmt) return;
    const mr = apr / 12;
    if (pmt <= bal * mr) { document.getElementById('result').innerHTML = '<strong style="color:red">Payment too low to cover interest!</strong>'; document.getElementById('result').classList.add('show'); return; }
    const months = Math.ceil(-Math.log(1 - (bal * mr) / pmt) / Math.log(1 + mr));
    const totalPaid = pmt * months;
    const totalInterest = totalPaid - bal;
    const years = Math.floor(months / 12);
    const remMonths = months % 12;
    const el = document.getElementById('result');
    el.innerHTML = `Time to Pay Off: <strong>${years} years ${remMonths} months</strong><br>Total Interest: $${totalInterest.toFixed(2)}<br>Total Amount Paid: $${totalPaid.toFixed(2)}`;
    el.classList.add('show');
}
</script>
