<div class="form-group">
    <label for="value">Value</label>
    <input type="number" id="value" placeholder="1" step="any">
</div>
<div class="form-row">
    <div class="form-group">
        <label for="fromUnit">From</label>
        <select id="fromUnit">
            <option value="bit">Bit (b)</option>
            <option value="byte">Byte (B)</option>
            <option value="KB">Kilobyte (KB)</option>
            <option value="MB">Megabyte (MB)</option>
            <option value="GB" selected>Gigabyte (GB)</option>
            <option value="TB">Terabyte (TB)</option>
            <option value="PB">Petabyte (PB)</option>
            <option value="KiB">Kibibyte (KiB)</option>
            <option value="MiB">Mebibyte (MiB)</option>
            <option value="GiB">Gibibyte (GiB)</option>
            <option value="TiB">Tebibyte (TiB)</option>
        </select>
    </div>
    <div class="form-group">
        <label for="toUnit">To</label>
        <select id="toUnit">
            <option value="bit">Bit (b)</option>
            <option value="byte">Byte (B)</option>
            <option value="KB">Kilobyte (KB)</option>
            <option value="MB" selected>Megabyte (MB)</option>
            <option value="GB">Gigabyte (GB)</option>
            <option value="TB">Terabyte (TB)</option>
            <option value="PB">Petabyte (PB)</option>
            <option value="KiB">Kibibyte (KiB)</option>
            <option value="MiB">Mebibyte (MiB)</option>
            <option value="GiB">Gibibyte (GiB)</option>
            <option value="TiB">Tebibyte (TiB)</option>
        </select>
    </div>
</div>
<button class="btn" onclick="convertStorage()">Convert</button>
<div class="result" id="result"></div>
<script>
function convertStorage() {
    const val = parseFloat(document.getElementById('value').value);
    if (isNaN(val)) return;
    const from = document.getElementById('fromUnit').value;
    const to = document.getElementById('toUnit').value;
    // 转换为字节
    const toBytes = {
        bit: 1/8, byte: 1,
        KB: 1e3, MB: 1e6, GB: 1e9, TB: 1e12, PB: 1e15,
        KiB: 1024, MiB: 1048576, GiB: 1073741824, TiB: 1099511627776
    };
    const bytes = val * toBytes[from];
    const result = bytes / toBytes[to];
    const el = document.getElementById('result');
    el.innerHTML = `<strong>${val} ${from} = ${result.toPrecision(10)} ${to}</strong>`;
    el.classList.add('show');
}
</script>
