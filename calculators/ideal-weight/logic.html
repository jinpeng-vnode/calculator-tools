<div class="form-row">
    <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>
    <div class="form-group">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="175" min="100" max="250">
    </div>
</div>
<button class="btn" onclick="calcIdeal()">Calculate Ideal Weight</button>
<div class="result" id="result"></div>
<script>
function calcIdeal() {
    const gender = document.getElementById('gender').value;
    const cm = parseFloat(document.getElementById('height').value);
    if (!cm) return;
    const inch = (cm - 152.4) / 2.54;
    let devine, robinson, miller, hamwi;
    if (gender === 'male') {
        devine = 50 + 2.3 * inch;
        robinson = 52 + 1.9 * inch;
        miller = 56.2 + 1.41 * inch;
        hamwi = 48 + 2.7 * inch;
    } else {
        devine = 45.5 + 2.3 * inch;
        robinson = 49 + 1.7 * inch;
        miller = 53.1 + 1.36 * inch;
        hamwi = 45.5 + 2.2 * inch;
    }
    const avg = (devine + robinson + miller + hamwi) / 4;
    const el = document.getElementById('result');
    el.innerHTML = `<strong>Average Ideal Weight: ${avg.toFixed(1)} kg</strong><br><br>Devine: ${devine.toFixed(1)} kg<br>Robinson: ${robinson.toFixed(1)} kg<br>Miller: ${miller.toFixed(1)} kg<br>Hamwi: ${hamwi.toFixed(1)} kg<br><br>Healthy range: <strong>${(avg*0.85).toFixed(1)} - ${(avg*1.15).toFixed(1)} kg</strong>`;
    el.classList.add('show');
}
</script>
