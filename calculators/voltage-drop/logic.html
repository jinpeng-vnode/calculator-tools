<div class="form-group">
    <label for="voltage">System Voltage (V)</label>
    <input type="number" id="voltage" placeholder="120" step="any">
</div>
<div class="form-group">
    <label for="current">Current (Amps)</label>
    <input type="number" id="current" placeholder="20" step="any">
</div>
<div class="form-group">
    <label for="length">One-way Wire Length (m)</label>
    <input type="number" id="length" placeholder="30" step="any">
</div>
<div class="form-group">
    <label for="gauge">Wire Gauge (AWG)</label>
    <select id="gauge">
        <option value="2">2</option><option value="4">4</option><option value="6">6</option>
        <option value="8">8</option><option value="10">10</option><option value="12" selected>12</option>
        <option value="14">14</option><option value="16">16</option>
    </select>
</div>
<button class="btn" onclick="calcVD()">Calculate Voltage Drop</button>
<div class="result" id="result"></div>

<script>
function calcVD(){
    const V=parseFloat(document.getElementById('voltage').value);
    const I=parseFloat(document.getElementById('current').value);
    const L=parseFloat(document.getElementById('length').value);
    const g=document.getElementById('gauge').value;
    if(isNaN(V)||isNaN(I)||isNaN(L))return;
    const awgArea={'2':33.63,'4':21.15,'6':13.30,'8':8.37,'10':5.26,'12':3.31,'14':2.08,'16':1.31};
    const area=awgArea[g];
    const resistivity=0.01724;
    const R=resistivity*L*2/area;
    const vd=I*R;
    const pct=(vd/V*100).toFixed(2);
    const el=document.getElementById('result');
    const status=pct<=3?'✅ Acceptable':'⚠️ Exceeds 3% recommendation';
    el.innerHTML=`<p>Wire resistance: <strong>${R.toFixed(4)} Ω</strong></p><p>Voltage drop: <strong>${vd.toFixed(2)} V</strong></p><p>Percentage: <strong>${pct}%</strong> ${status}</p><p>Voltage at load: <strong>${(V-vd).toFixed(2)} V</strong></p>`;
    el.classList.add('show');
}
</script>
