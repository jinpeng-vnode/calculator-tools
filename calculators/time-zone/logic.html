<div class="form-row">
    <div class="form-group">
        <label for="sourceTime">Time</label>
        <input type="time" id="sourceTime" value="12:00">
    </div>
    <div class="form-group">
        <label for="sourceDate">Date</label>
        <input type="date" id="sourceDate">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="fromZone">From Time Zone</label>
        <select id="fromZone">
            <option value="-12">UTC-12 (Baker Island)</option>
            <option value="-11">UTC-11 (Samoa)</option>
            <option value="-10">UTC-10 (Hawaii)</option>
            <option value="-9">UTC-9 (Alaska)</option>
            <option value="-8">UTC-8 (Pacific US)</option>
            <option value="-7">UTC-7 (Mountain US)</option>
            <option value="-6">UTC-6 (Central US)</option>
            <option value="-5">UTC-5 (Eastern US)</option>
            <option value="-4">UTC-4 (Atlantic)</option>
            <option value="-3">UTC-3 (Brazil)</option>
            <option value="-2">UTC-2</option>
            <option value="-1">UTC-1 (Azores)</option>
            <option value="0" selected>UTC+0 (London/GMT)</option>
            <option value="1">UTC+1 (Paris/Berlin)</option>
            <option value="2">UTC+2 (Cairo)</option>
            <option value="3">UTC+3 (Moscow)</option>
            <option value="4">UTC+4 (Dubai)</option>
            <option value="5">UTC+5 (Pakistan)</option>
            <option value="5.5">UTC+5:30 (India)</option>
            <option value="6">UTC+6 (Bangladesh)</option>
            <option value="7">UTC+7 (Bangkok)</option>
            <option value="8">UTC+8 (Beijing/Singapore)</option>
            <option value="9">UTC+9 (Tokyo/Seoul)</option>
            <option value="9.5">UTC+9:30 (Adelaide)</option>
            <option value="10">UTC+10 (Sydney)</option>
            <option value="11">UTC+11 (Solomon Is.)</option>
            <option value="12">UTC+12 (Auckland)</option>
        </select>
    </div>
    <div class="form-group">
        <label for="toZone">To Time Zone</label>
        <select id="toZone">
            <option value="-12">UTC-12 (Baker Island)</option>
            <option value="-11">UTC-11 (Samoa)</option>
            <option value="-10">UTC-10 (Hawaii)</option>
            <option value="-9">UTC-9 (Alaska)</option>
            <option value="-8">UTC-8 (Pacific US)</option>
            <option value="-7">UTC-7 (Mountain US)</option>
            <option value="-6">UTC-6 (Central US)</option>
            <option value="-5">UTC-5 (Eastern US)</option>
            <option value="-4">UTC-4 (Atlantic)</option>
            <option value="-3">UTC-3 (Brazil)</option>
            <option value="-2">UTC-2</option>
            <option value="-1">UTC-1 (Azores)</option>
            <option value="0">UTC+0 (London/GMT)</option>
            <option value="1">UTC+1 (Paris/Berlin)</option>
            <option value="2">UTC+2 (Cairo)</option>
            <option value="3">UTC+3 (Moscow)</option>
            <option value="4">UTC+4 (Dubai)</option>
            <option value="5">UTC+5 (Pakistan)</option>
            <option value="5.5">UTC+5:30 (India)</option>
            <option value="6">UTC+6 (Bangladesh)</option>
            <option value="7">UTC+7 (Bangkok)</option>
            <option value="8" selected>UTC+8 (Beijing/Singapore)</option>
            <option value="9">UTC+9 (Tokyo/Seoul)</option>
            <option value="9.5">UTC+9:30 (Adelaide)</option>
            <option value="10">UTC+10 (Sydney)</option>
            <option value="11">UTC+11 (Solomon Is.)</option>
            <option value="12">UTC+12 (Auckland)</option>
        </select>
    </div>
</div>
<button class="btn" onclick="convertTZ()">Convert</button>
<div class="result" id="result"></div>
<script>
document.getElementById('sourceDate').valueAsDate = new Date();
function convertTZ() {
    const time = document.getElementById('sourceTime').value;
    const date = document.getElementById('sourceDate').value;
    if (!time || !date) return;
    const fromOffset = parseFloat(document.getElementById('fromZone').value);
    const toOffset = parseFloat(document.getElementById('toZone').value);
    const [h, m] = time.split(':').map(Number);
    const totalMin = h * 60 + m + (toOffset - fromOffset) * 60;
    let dayShift = 0;
    let newMin = totalMin;
    if (newMin < 0) { newMin += 1440; dayShift = -1; }
    if (newMin >= 1440) { newMin -= 1440; dayShift = 1; }
    const rh = String(Math.floor(newMin / 60)).padStart(2, '0');
    const rm = String(newMin % 60).padStart(2, '0');
    const srcDate = new Date(date);
    const tgtDate = new Date(srcDate);
    tgtDate.setDate(tgtDate.getDate() + dayShift);
    const el = document.getElementById('result');
    const dayNote = dayShift === 1 ? ' (next day)' : dayShift === -1 ? ' (previous day)' : '';
    el.innerHTML = `Converted Time: <strong>${rh}:${rm}${dayNote}</strong><br>
        Date: ${tgtDate.toISOString().split('T')[0]}`;
    el.classList.add('show');
}
</script>
