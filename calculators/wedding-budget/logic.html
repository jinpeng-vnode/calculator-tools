<div class="form-row">
    <div class="form-group">
        <label for="budget">Total Budget ($)</label>
        <input type="number" id="budget" placeholder="30000" min="0">
    </div>
    <div class="form-group">
        <label for="guests">Number of Guests</label>
        <input type="number" id="guests" placeholder="100" min="1">
    </div>
</div>
<button class="btn" onclick="calcWedding()">Calculate Budget</button>
<div class="result" id="result"></div>
<script>
function calcWedding() {
    const budget = parseFloat(document.getElementById('budget').value);
    const guests = parseInt(document.getElementById('guests').value) || 100;
    if (!budget) return;
    const items = [
        {name: 'Venue & Catering', pct: 0.45},
        {name: 'Photography & Video', pct: 0.12},
        {name: 'Music & Entertainment', pct: 0.08},
        {name: 'Flowers & Decor', pct: 0.08},
        {name: 'Attire & Beauty', pct: 0.08},
        {name: 'Invitations & Paper', pct: 0.03},
        {name: 'Transportation', pct: 0.03},
        {name: 'Favors & Gifts', pct: 0.03},
        {name: 'Contingency', pct: 0.10}
    ];
    let html = `<strong>Budget Breakdown (${guests} guests):</strong><br>Cost per guest: $${(budget * 0.45 / guests).toFixed(0)}<br><br>`;
    items.forEach(i => { html += `${i.name}: <strong>$${Math.round(budget * i.pct).toLocaleString()}</strong> (${(i.pct*100)}%)<br>`; });
    const el = document.getElementById('result');
    el.innerHTML = html;
    el.classList.add('show');
}
</script>
