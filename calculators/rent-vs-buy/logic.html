<div class="form-row">
    <div class="form-group">
        <label for="rent">Monthly Rent ($)</label>
        <input type="number" id="rent" placeholder="2000" min="0">
    </div>
    <div class="form-group">
        <label for="homePrice">Home Price ($)</label>
        <input type="number" id="homePrice" placeholder="400000" min="0">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="downPct">Down Payment (%)</label>
        <input type="number" id="downPct" placeholder="20" min="0" max="100">
    </div>
    <div class="form-group">
        <label for="mortRate">Mortgage Rate (%)</label>
        <input type="number" id="mortRate" placeholder="6.5" min="0" step="0.01">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="stayYears">Years You'll Stay</label>
        <input type="number" id="stayYears" placeholder="7" min="1" max="30">
    </div>
    <div class="form-group">
        <label for="appreciation">Home Appreciation (%/yr)</label>
        <input type="number" id="appreciation" placeholder="3" min="0" step="0.1">
    </div>
</div>
<button class="btn" onclick="calcRentBuy()">Compare</button>
<div class="result" id="result"></div>
<script>
function calcRentBuy() {
    const rent = parseFloat(document.getElementById('rent').value);
    const price = parseFloat(document.getElementById('homePrice').value);
    const down = parseFloat(document.getElementById('downPct').value) / 100;
    const rate = parseFloat(document.getElementById('mortRate').value) / 100 / 12;
    const years = parseInt(document.getElementById('stayYears').value);
    const appr = parseFloat(document.getElementById('appreciation').value) / 100;
    if (!rent || !price || !years) return;
    const loan = price * (1 - down);
    const n = 360;
    const monthly = rate > 0 ? loan * rate * Math.pow(1+rate,n) / (Math.pow(1+rate,n)-1) : loan/n;
    const rentTotal = rent * 12 * years * (1 + 0.03 * years / 2);
    const buyMonthly = monthly + price * 0.012/12 + price * 0.005/12;
    const buyTotal = buyMonthly * 12 * years + price * down;
    const homeValue = price * Math.pow(1 + appr, years);
    const equity = homeValue - loan * 0.85;
    const buyCost = buyTotal - equity;
    const el = document.getElementById('result');
    const better = rentTotal < buyCost ? 'Renting' : 'Buying';
    el.innerHTML = `<strong>Total Cost of Renting:</strong> $${Math.round(rentTotal).toLocaleString()}<br><strong>Net Cost of Buying:</strong> $${Math.round(buyCost).toLocaleString()}<br>Home Value in ${years} yrs: $${Math.round(homeValue).toLocaleString()}<br><strong>${better} is cheaper by $${Math.abs(Math.round(rentTotal - buyCost)).toLocaleString()}</strong>`;
    el.classList.add('show');
}
</script>
