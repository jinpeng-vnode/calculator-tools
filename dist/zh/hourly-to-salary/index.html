</div>

<button class="btn" onclick="calcSalary()">Calculate</button>

<script>
function calcSalary() {
    const rate = parseFloat(document.getElementById('hourly').value);
    const hrs = parseFloat(document.getElementById('hrsWeek').value) || 40;
    const weeks = parseFloat(document.getElementById('weeksYear').value) || 52;
    if (!rate) return;
    const annual = rate * hrs * weeks;
    const monthly = annual / 12;
    const weekly = rate * hrs;
    const daily = weekly / 5;
    const el = document.getElementById('result');
    el.innerHTML = `Annual Salary: <strong>$${annual.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</strong><br>Monthly: $${monthly.toFixed(2)}<br>Weekly: $${weekly.toFixed(2)}<br>Daily (5-day): $${daily.toFixed(2)}`;
    el.classList.add('show');
}
