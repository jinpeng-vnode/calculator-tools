    <div class="form-group">
        <label for="radius">Radius</label>

    </div>

<button class="btn" onclick="calcCircle()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcCircle() {
    const r = parseFloat(document.getElementById('radius').value);
    const unit = document.getElementById('unit').value;
    if (!r) return;
    const area = Math.PI * r * r;
    const circumference = 2 * Math.PI * r;
    const diameter = 2 * r;
    const el = document.getElementById('result');
    el.innerHTML = `Area: <strong>${area.toFixed(4)} ${unit}²</strong><br>Circumference: ${circumference.toFixed(4)} ${unit}<br>Diameter: ${diameter.toFixed(4)} ${unit}`;
    el.classList.add('show');
}
</script>

<details><summary>圆面积公式是什么？</summary><p>面积 = π × r²，其中r为半径。例如半径为5的圆，面积 = π × 25 ≈ 78.54平方单位。</p></details>
<details><summary>如何从面积求半径？</summary><p>半径 = √(面积 / π)。将面积除以π，再开平方根。</p></details>
<details><summary>周长公式是什么？</summary><p>周长 = 2 × π × r，或等价于 π × d，其中d为直径。</p></details>
