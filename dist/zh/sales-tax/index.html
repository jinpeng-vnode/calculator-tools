    <div class="form-group">
        <label for="price">Price ($)</label>
        <input type="number" id="price" placeholder="100" min="0" step="0.01">
    </div>
    <div class="form-group">
        <label for="taxRate">Tax Rate (%)</label>
        <input type="number" id="taxRate" placeholder="8.25" min="0" step="0.01">
    </div>
</div>
<button class="btn" onclick="calcTax()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcTax() {
    const price = parseFloat(document.getElementById('price').value);
    const rate = parseFloat(document.getElementById('taxRate').value) / 100;
    if (!price || isNaN(rate)) return;
    const tax = price * rate;
    const total = price + tax;
    const el = document.getElementById('result');
    el.innerHTML = `Tax Amount: <strong>$${tax.toFixed(2)}</strong><br>Total Price: <strong>$${total.toFixed(2)}</strong><br>Pre-tax Price: $${price.toFixed(2)}`;
    el.classList.add('show');
}
</script>
