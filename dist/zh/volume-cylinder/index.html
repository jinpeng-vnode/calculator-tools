<button class="btn" onclick="calcCylinder()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcCylinder() {
    const r = parseFloat(document.getElementById('radius').value);
    const h = parseFloat(document.getElementById('height').value);
    const unit = document.getElementById('unit').value;
    if (!r || !h) return;
    const volume = Math.PI * r * r * h;
    const lateralArea = 2 * Math.PI * r * h;
    const totalArea = 2 * Math.PI * r * r + lateralArea;
    const el = document.getElementById('result');
    el.innerHTML = `Volume: <strong>${volume.toFixed(4)} ${unit}³</strong><br>Surface Area: ${totalArea.toFixed(4)} ${unit}²<br>Lateral Area: ${lateralArea.toFixed(4)} ${unit}²`;
    el.classList.add('show');
}
</script>

<details><summary>圆柱体积公式是什么？</summary><p>体积 = π × r² × h，其中r为半径，h为高度。</p></details>
<details><summary>如何计算圆柱表面积？</summary><p>总表面积 = 2πr² + 2πrh（两个圆形底面 + 侧面积）。</p></details>
<details><summary>什么是侧面积？</summary><p>侧面积 = 2πrh。仅指曲面部分的面积，不包括顶部和底部的圆。</p></details>
