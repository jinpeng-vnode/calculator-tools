        <h1>折扣计算器</h1>
        <p class="intro">计算打折后您能省多少钱。输入原价和折扣比例即可。</p>

        <div class="calculator-wrapper">
            <div class="form-row">
    <div class="form-group">
        <label for="origPrice">Original Price ($)</label>
        <input type="number" id="origPrice" placeholder="100" step="0.01" min="0">
    </div>
    <div class="form-group">
        <label for="discPct">Discount (%)</label>
        <input type="number" id="discPct" placeholder="30" min="0" max="100">
    </div>
</div>
<button class="btn" onclick="calcDiscount()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcDiscount() {
    const price = parseFloat(document.getElementById('origPrice').value);
    const disc = parseFloat(document.getElementById('discPct').value);
    if (isNaN(price) || isNaN(disc)) return;
    const savings = price * disc / 100;
    const final_price = price - savings;
    const el = document.getElementById('result');
    el.innerHTML = `You save: <strong>$${savings.toFixed(2)}</strong><br>Final price: <strong>$${final_price.toFixed(2)}</strong>`;
    el.classList.add('show');
}
</script>

<details><summary>如何计算折扣？</summary><p>折后价 = 原价 × (1 - 折扣%/100)。例如100元打7折：100 × 0.70 = 70元。</p></details>
<details><summary>如何从折后价反推原价？</summary><p>原价 = 折后价 / (1 - 折扣%/100)。70元是打7折后的价格：70 / 0.70 = 100元。</p></details>
