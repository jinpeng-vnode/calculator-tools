        <h1>小费计算器</h1>
        <p class="intro">计算小费金额，支持多人分账。</p>

        <div class="calculator-wrapper">
            <div class="form-group">
    <label for="billAmt">Bill Amount ($)</label>
    <input type="number" id="billAmt" placeholder="85.50" step="0.01" min="0">
</div>
<div class="form-row">
    <div class="form-group">
        <label for="tipPct">Tip (%)</label>
        <input type="number" id="tipPct" value="18" min="0" max="100">
    </div>
    <div class="form-group">
        <label for="people">Split Between</label>
        <input type="number" id="people" value="1" min="1" max="100">
    </div>
</div>
<button class="btn" onclick="calcTip()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcTip() {
    const bill = parseFloat(document.getElementById('billAmt').value);
    const pct = parseFloat(document.getElementById('tipPct').value);
    const ppl = parseInt(document.getElementById('people').value) || 1;
    if (isNaN(bill) || isNaN(pct)) return;
    const tip = bill * pct / 100;
    const total = bill + tip;
    const perPerson = total / ppl;
    const el = document.getElementById('result');
    el.innerHTML = `Tip: <strong>$${tip.toFixed(2)}</strong><br>
        Total: $${total.toFixed(2)}<br>
        ${ppl > 1 ? `Per person: <strong>$${perPerson.toFixed(2)}</strong>` : ''}`;
    el.classList.add('show');
}
</script>
