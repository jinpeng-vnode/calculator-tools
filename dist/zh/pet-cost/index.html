.form-group input, .form-group select {

.form-group input:focus, .form-group select:focus {

    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.btn {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
}
.btn:hover { background: var(--primary-dark); }

.result {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #f0f9ff;
    border-radius: 8px;

    font-size: 1.125rem;
    text-align: center;
    display: none;
}
.result.show { display: block; }
.result strong { color: var(--primary); font-size: 1.5rem; }

.calc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
.calc-card {

    <div class="form-group">

</div>

        </select>
    </div>
    <div class="form-group">
        <label for="grooming">Grooming</label>

<button class="btn" onclick="calcPet()">Calculate</button>

<script>
function calcPet() {
    const type = document.getElementById('petType').value;
    const foodMult = parseFloat(document.getElementById('foodQuality').value);
    const insurance = parseFloat(document.getElementById('insurance').value);
    const grooming = parseFloat(document.getElementById('grooming').value);
    const base = {
        'dog-small': {food: 400, vet: 700, supplies: 200},
        'dog-medium': {food: 600, vet: 800, supplies: 250},
        'dog-large': {food: 900, vet: 900, supplies: 300},
        'cat': {food: 350, vet: 600, supplies: 150}
    }[type];
    const food = base.food * foodMult;
    const vet = base.vet;
    const supplies = base.supplies;
    const total = food + vet + supplies + insurance + grooming;
    const el = document.getElementById('result');
    el.innerHTML = `<strong>Annual Pet Cost: $${Math.round(total).toLocaleString()}</strong><br>Monthly: $${Math.round(total/12)}<br><br>Food: $${Math.round(food)}<br>Vet Care: $${vet}<br>Supplies: $${supplies}<br>Insurance: $${insurance}<br>Grooming: $${grooming}`;
    el.classList.add('show');
}
</script>
