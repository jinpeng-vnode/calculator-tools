            <div class="form-group">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <input type="number" id="n1" style="width:60px" placeholder="1">
        <span>/</span>
        <input type="number" id="d1" style="width:60px" placeholder="3">
        <select id="op" style="width:50px"><option>+</option><option>−</option><option>×</option><option>÷</option></select>
        <input type="number" id="n2" style="width:60px" placeholder="1">
        <span>/</span>
        <input type="number" id="d2" style="width:60px" placeholder="4">
    </div>

<button class="btn" onclick="calcFraction()">Calculate</button>
<div class="result" id="result"></div>

<script>
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b]}return a}
function calcFraction(){
    let n1=parseInt(document.getElementById('n1').value);
    let d1=parseInt(document.getElementById('d1').value);
    let n2=parseInt(document.getElementById('n2').value);
    let d2=parseInt(document.getElementById('d2').value);
    const op=document.getElementById('op').value;
    if([n1,d1,n2,d2].some(isNaN)||d1===0||d2===0)return;
    let rn,rd;
    if(op==='+'){rn=n1*d2+n2*d1;rd=d1*d2}
    else if(op==='−'){rn=n1*d2-n2*d1;rd=d1*d2}
    else if(op==='×'){rn=n1*n2;rd=d1*d2}
    else{if(n2===0)return;rn=n1*d2;rd=d1*n2}
    if(rd<0){rn=-rn;rd=-rd}
    const g=gcd(rn,rd);
    rn/=g;rd/=g;
    const el=document.getElementById('result');
    const dec=(rn/rd).toFixed(4).replace(/\.?0+$/,'');
    el.innerHTML=rd===1?`Result: <strong>${rn}</strong> (${dec})`:`Result: <strong>${rn}/${rd}</strong> (≈ ${dec})`;
    el.classList.add('show');
}
</script>

<details><summary>如何约分？</summary><p>将分子和分母同时除以它们的最大公约数。例如：8/12 ÷ 4 = 2/3。</p></details>
