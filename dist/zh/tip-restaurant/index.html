        <h1>餐厅小费计算器</h1>
        <p class="intro">快速计算餐厅账单的小费。选择小费比例并在多人间分摊。</p>

        <div class="calculator-wrapper">
            <div class="form-row">
    <div class="form-group">
        <label for="billAmount">Bill Amount ($)</label>
        <input type="number" id="billAmount" placeholder="85.50" step="0.01" min="0">
    </div>
    <div class="form-group">
        <label for="tipPercent">Tip Percentage (%)</label>
        <select id="tipPercent">
            <option value="10">10%</option>
            <option value="15">15%</option>
            <option value="18">18%</option>
            <option value="20" selected>20%</option>
            <option value="25">25%</option>
        </select>
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="numPeople">Split Among (people)</label>
        <input type="number" id="numPeople" placeholder="1" min="1" max="50" value="1">
    </div>
</div>
<button class="btn" onclick="calcTip()">Calculate Tip</button>
<div class="result" id="result"></div>
<script>
function calcTip() {
    const bill = parseFloat(document.getElementById('billAmount').value);
    const tipPct = parseFloat(document.getElementById('tipPercent').value);
    const people = parseInt(document.getElementById('numPeople').value) || 1;
    if (!bill) return;
    const tip = bill * tipPct / 100;
    const total = bill + tip;
    const perPerson = total / people;
    const el = document.getElementById('result');
    el.innerHTML = `Tip Amount: <strong>$${tip.toFixed(2)}</strong><br>Total: $${total.toFixed(2)}<br>Per Person: <strong>$${perPerson.toFixed(2)}</strong>`;
    el.classList.add('show');
}
</script>
