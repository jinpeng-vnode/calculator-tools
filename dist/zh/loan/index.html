        <h1>贷款计算器</h1>
        <p class="intro">计算您的每月还款额、总利息支出，查看完整的还款明细。</p>

        <div class="calculator-wrapper">
            <div class="form-group">
    <label for="principal">Loan Amount ($)</label>
    <input type="number" id="principal" placeholder="200000" min="1">
</div>
<div class="form-row">
    <div class="form-group">
        <label for="rate">Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="5.5" min="0" step="0.1">
    </div>
    <div class="form-group">
        <label for="years">Loan Term (years)</label>
        <input type="number" id="years" placeholder="30" min="1" max="50">
    </div>
</div>
<button class="btn" onclick="calcLoan()">Calculate</button>
<div class="result" id="result"></div>
<script>
function calcLoan() {
    const P = parseFloat(document.getElementById('principal').value);
    const annualRate = parseFloat(document.getElementById('rate').value);
    const years = parseFloat(document.getElementById('years').value);
    if (!P || !annualRate || !years) return;
    const r = annualRate / 100 / 12;
    const n = years * 12;
    const monthly = P * (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
    const total = monthly * n;
    const interest = total - P;
    const el = document.getElementById('result');
    el.innerHTML = `Monthly Payment: <strong>$${monthly.toFixed(2)}</strong><br>
        Total Interest: $${interest.toFixed(2)}<br>
        Total Payment: $${total.toFixed(2)}`;
    el.classList.add('show');
}
</script>

        <section class="faq"><h2>FAQ</h2>
<details><summary>月供是如何计算的？</summary><p>月供 = 本金 × [月利率(1+月利率)^期数] / [(1+月利率)^期数 – 1]，即等额本息还款法。</p></details>
<details><summary>等额本息和等额本金有什么区别？</summary><p>等额本息每月还款额固定；等额本金每月本金固定，利息递减，前期还款压力大但总利息少。</p></details>
