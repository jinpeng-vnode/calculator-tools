<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <meta name="keywords" content="{{keywords}}">
    <link rel="canonical" href="{{canonical}}">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="website">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <style>{{inline_css}}</style>
    <script type="application/ld+json">{{schema_json}}</script>
    <!-- Google AdSense -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXX" crossorigin="anonymous"></script> -->
</head>
<body>
    <header>
        <nav class="container">
            <a href="/{{lang}}/" class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg> CalcTools</a>
            <div class="nav-links">
                <a href="/en/">EN</a>
                <a href="/zh/">中文</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- 顶部广告位 -->
        <div class="ad-slot ad-top">
            <!-- <ins class="adsbygoogle" data-ad-client="ca-pub-XXXXXXX" data-ad-slot="1234567890" data-ad-format="auto"></ins> -->
        </div>

        <h1>{{h1}}</h1>
        <p class="intro">{{intro}}</p>

        <div class="calculator-wrapper">
            {{calculator_body}}
        </div>

        <!-- 中部广告位 -->
        <div class="ad-slot ad-mid">
            <!-- <ins class="adsbygoogle" data-ad-client="ca-pub-XXXXXXX" data-ad-slot="0987654321" data-ad-format="auto"></ins> -->
        </div>

        {{faq_html}}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 CalcTools. Free online calculators for everyone.</p>
            <nav>
                <a href="/en/">Home</a>
                <a href="/en/bmi/">BMI</a>
                <a href="/en/loan/">Loan</a>
                <a href="/en/percentage/">Percentage</a>
                <a href="/en/age/">Age</a>
                <a href="/en/unit-length/">Length</a>
            </nav>
        </div>
    </footer>

    <!-- 底部广告位 -->
    <div class="ad-slot ad-bottom container">
        <!-- <ins class="adsbygoogle" data-ad-client="ca-pub-XXXXXXX" data-ad-slot="1122334455" data-ad-format="auto"></ins> -->
    </div>
</body>
</html>
